name: Build check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hugo-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go (required for Hugo Modules)
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.160.1"
          extended: true

      - name: Cache Hugo modules
        uses: actions/cache@v4
        with:
          path: /tmp/hugo_cache
          key: hugo-modules-${{ hashFiles('go.sum') }}
          restore-keys: hugo-modules-

      - name: Build
        run: hugo --gc --minify --environment production
        env:
          HUGO_CACHEDIR: /tmp/hugo_cache

      - name: Verify critical outputs
        run: |
          test -f public/sitemap.xml       || (echo "FAIL: sitemap.xml missing" && exit 1)
          test -f public/robots.txt        || (echo "FAIL: robots.txt missing" && exit 1)
          test -f public/index.html        || (echo "FAIL: index.html missing" && exit 1)
          test -f public/estudios/index.html || (echo "FAIL: /estudios/ missing" && exit 1)
          echo "All critical outputs present."
